<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page introuvable — 404</title>
  <style>
    :root{ --bg:#f7f9fc; --surface:#fff; --text:#0f172a; --muted:#475569; --line:#e2e8f0; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ width:min(100% - 32px, 860px); margin:0 auto; padding:64px 0; }
    .card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px; }
    h1{ margin:0 0 8px; font-size:1.6rem; letter-spacing:-0.02em; }
    p{ margin:0 0 14px; color:var(--muted); line-height:1.6; }
    a{ display:inline-block; padding:10px 12px; border-radius:12px; border:1px solid var(--line); text-decoration:none; color:var(--text); background:#fff; }
    a:hover{ border-color:#cbd5e1; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Erreur 404">
      <h1>404 — Page introuvable</h1>
      <p>La page demandée n’existe pas (ou a été déplacée).</p>
      <a href="./">Retour à l’accueil</a>
    </section>
  </main>
</body>
</html>
